name: FB Multi Stream MATRIX PRO MAX (ULTRA COPY MODE)

on:
  workflow_dispatch:
    inputs:
      SOURCE_LINKS:
        description: 'روابط البث - فرق بينهم بـ ,'
        required: true
      FB_STREAM_KEYS:
        description: 'مفاتيح البث - فرق بينهم بـ ,'
        required: true

jobs:
  stream:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        worker: [0, 1, 2, 3]

    steps:  
      - name: ⚡ Install FFmpeg  
        run: |  
          sudo apt-get update  
          sudo apt-get install -y ffmpeg  

      - name: 🎥 Launch Parallel Streams inside Worker ${{ matrix.worker }}  
        run: |  
          # تنظيف وتنقية المدخلات من الفراغات
          CLEANED_SOURCES=$(echo "${{ github.event.inputs.SOURCE_LINKS }}" | sed 's/ //g')
          CLEANED_KEYS=$(echo "${{ github.event.inputs.FB_STREAM_KEYS }}" | sed 's/ //g')

          IFS=',' read -ra SOURCES <<< "$CLEANED_SOURCES"
          IFS=',' read -ra KEYS <<< "$CLEANED_KEYS"

          if [ "${#SOURCES[@]}" -ne "${#KEYS[@]}" ]; then  
            echo "❌ عدد الروابط وعدد المفاتيح غير متساوي!"  
            exit 1  
          fi  

          NUM_WORKERS=4
          WORKER_ID=${{ matrix.worker }}
          
          echo "========================================="  
          echo "🎬 Worker $WORKER_ID is sorting and launching its streams..."  
          echo "========================================="  

          for (( i=0; i<${#SOURCES[@]}; i++ ))  
          do
            if [ $(( i % NUM_WORKERS )) -eq $WORKER_ID ]; then
              SRC="${SOURCES[$i]}"
              KEY="${KEYS[$i]}"
              IDX=$((i+1))

              if [ -z "$SRC" ] || [ -z "$KEY" ]; then
                continue
              fi

              echo "🚀 Starting Stream #$IDX on Worker $WORKER_ID in background (COPY MODE)..."

              # استخدام -c:v copy و -c:a copy لتوفير جهد المعالج بالكامل وتحقيق أقصى عدد بثوث
              ffmpeg \
                -hide_banner \
                -reconnect 1 \
                -reconnect_streamed 1 \
                -reconnect_delay_max 10 \
                -thread_queue_size 4096 \
                -i "$SRC" \
                -c:v copy \
                -c:a copy \
                -f flv \
                "rtmps://live-api-s.facebook.com:443/rtmp/$KEY" &
                
              sleep 2
            fi
          done

          echo "⏳ All assigned background streams launched. Waiting for active streams to finish..."
          wait
