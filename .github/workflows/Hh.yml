name: 🚀 FB Multi Stream MATRIX PRO MAX

on:
  workflow_dispatch:
    inputs:
      SOURCE_LINKS:
        description: 'روابط البث - فرق بينهم بـ ,'
        required: true
      FB_STREAM_KEYS:
        description: 'مفاتيح البث - فرق بينهم بـ ,'
        required: true
      WATERMARK_TEXT:
        description: 'نص العلامة المائية'
        required: true
        default: 'CHAFIK GHADDAR TV'

jobs:
  stream:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # هنا كنقسمو الخدمة على 4 ديال الـ Runners كحد أقصى مسموح به بالتوازي
        worker: [0, 1, 2, 3]

    steps:  
      - name: ⚡ Install FFmpeg  
        run: |  
          sudo apt-get update  
          sudo apt-get install -y ffmpeg  

      - name: 🎥 Launch Parallel Streams inside Worker ${{ matrix.worker }}  
        run: |  
          IFS=',' read -ra SOURCES <<< "${{ github.event.inputs.SOURCE_LINKS }}"
          IFS=',' read -ra KEYS <<< "${{ github.event.inputs.FB_STREAM_KEYS }}"

          if [ "${#SOURCES[@]}" -ne "${#KEYS[@]}" ]; then  
            echo "❌ عدد الروابط وعدد المفاتيح غير متساوي!"  
            exit 1  
          fi  

          NUM_WORKERS=4
          WORKER_ID=${{ matrix.worker }}
          
          echo "========================================="  
          echo "🎬 Worker $WORKER_ID is sorting and launching its streams..."  
          echo "========================================="  

          for (( i=0; i<${#SOURCES[@]}; i++ ))  
          do
            # توزيع الروابط بالتساوي على الـ 4 ديال الـ Runners
            if [ $(( i % NUM_WORKERS )) -eq $WORKER_ID ]; then
              SRC=$(echo "${SOURCES[$i]}" | xargs)
              KEY=$(echo "${KEYS[$i]}" | xargs)
              IDX=$((i+1))

              echo "🚀 Starting Stream #$IDX on Worker $WORKER_ID in background..."

              ffmpeg \
                -hide_banner \
                -reconnect 1 \
                -reconnect_streamed 1 \
                -reconnect_delay_max 10 \
                -thread_queue_size 4096 \
                -i "$SRC" \
                -vf "drawtext=text='${{ github.event.inputs.WATERMARK_TEXT }}':fontcolor=white:fontsize=36:borderw=2:bordercolor=black:box=1:boxcolor=black@0.4:x=w-mod(t*100\,w+tw):y=h-th-25" \
                -map 0:v:0 \
                -map 0:a? \
                -c:v libx264 \
                -preset ultrafast \
                -tune zerolatency \
                -pix_fmt yuv420p \
                -profile:v main \
                -r 30 \  
                -g 60 \  
                -keyint_min 60 \  
                -sc_threshold 0 \  
                -b:v 2500k \  
                -maxrate 2500k \  
                -bufsize 5000k \  
                -c:a aac \  
                -b:a 128k \  
                -ar 44100 \  
                -f flv \  
                "rtmps://live-api-s.facebook.com:443/rtmp/$KEY" &
            fi
          done

          echo "⏳ All assigned background streams launched. Waiting for active streams to finish..."
          # هاد الأمر ضروري باش الوركر ميسدش السيرفر حتى يسالي البث بالكامل
          wait
