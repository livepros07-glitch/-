name: 🚀 FB Multi Stream MATRIX PRO MAX (DIRECT BIND MODE)

on:
  workflow_dispatch:
    inputs:
      SOURCE_LINKS:
        description: 'روابط البث - فرق بينهم بـ ,'
        required: true
      FB_STREAM_KEYS:
        description: 'مفاتيح البث - فرق بينهم بـ ,'
        required: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: 🧩 Generate Dynamic Matrix
        id: set-matrix
        shell: bash
        run: |
          # تنظيف الفراغات
          CLEANED_SOURCES=$(echo "${{ github.event.inputs.SOURCE_LINKS }}" | sed 's/ //g')
          CLEANED_KEYS=$(echo "${{ github.event.inputs.FB_STREAM_KEYS }}" | sed 's/ //g')

          IFS=',' read -ra SOURCES <<< "$CLEANED_SOURCES"
          IFS=',' read -ra KEYS <<< "$CLEANED_KEYS"

          if [ "${#SOURCES[@]}" -ne "${#KEYS[@]}" ]; then  
            echo "❌ عدد الروابط وعدد المفاتيح غير متساوي!"  
            exit 1  
          fi  
            
          JSON="["  
          for (( i=0; i<${#SOURCES[@]}; i++ ))  
          do  
            SRC="${SOURCES[$i]}"  
            KEY="${KEYS[$i]}"  
            IDX=$((i+1))  
            JSON="$JSON{\"source\":\"$SRC\",\"key\":\"$KEY\",\"index\":$IDX}"  
            if [ $i -lt $(( ${#SOURCES[@]} - 1 )) ]; then  
              JSON="$JSON,"  
            fi  
          done  
          JSON="$JSON]"  
            
          echo "matrix=$JSON" >> $GITHUB_OUTPUT

  stream:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # هنا اللعبة: كنقولو لـ GitHub خدم غير 4 ديال اللايفات دقة وحدة بالتوازي (Max Parallel) 
      # والروابط الباقية كتبقى في الصف (Queue) أوتوماتيكياً بلا ما يتبلوكا الحساب ديالك
      max-parallel: 4
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:  
      - name: ⚡ Install FFmpeg  
        run: |  
          sudo apt-get update  
          sudo apt-get install -y ffmpeg  

      - name: 🎥 Launch Dedicated Stream ${{ matrix.index }}  
        run: |  
          echo "========================================="  
          echo "🎬 STARTING STREAM #${{ matrix.index }} (DIRECT LINK TO KEY)"  
          echo "========================================="  
            
          # دابا السورس مربوط مع الكي ديالو نيشان بلا حساب بلا تخربيق
          # واستخدمنا الـ copy Mode باش ما ياكلش الـ CPU
          ffmpeg \
            -hide_banner \
            -reconnect 1 \
            -reconnect_streamed 1 \
            -reconnect_delay_max 10 \
            -thread_queue_size 4096 \
            -i "${{ matrix.source }}" \
            -c:v copy \
            -c:a copy \
            -f flv \
            "rtmps://live-api-s.facebook.com:443/rtmp/${{ matrix.key }}"
