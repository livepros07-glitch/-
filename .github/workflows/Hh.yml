name: 🚀 FB Multi Stream MATRIX PRO MAX (FINAL COMPATIBLE)

on:
  workflow_dispatch:
    inputs:
      SOURCE_LINKS:
        description: 'روابط البث - فرق بينهم بـ ,'
        required: true
      FB_STREAM_KEYS:
        description: 'مفاتيح البث - فرق بينهم بـ ,'
        required: true

jobs:
  stream:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 4 سيرفرات كحد أقصى مسموح به بالتوازي
        worker: [0, 1, 2, 3]

    steps:  
      - name: ⚡ Install FFmpeg  
        run: |  
          sudo apt-get update  
          sudo apt-get install -y ffmpeg  

      - name: 🎥 Launch Parallel Streams inside Worker ${{ matrix.worker }}  
        run: |  
          CLEANED_SOURCES=$(echo "${{ github.event.inputs.SOURCE_LINKS }}" | sed 's/ //g')
          CLEANED_KEYS=$(echo "${{ github.event.inputs.FB_STREAM_KEYS }}" | sed 's/ //g')

          IFS=',' read -ra SOURCES <<< "$CLEANED_SOURCES"
          IFS=',' read -ra KEYS <<< "$CLEANED_KEYS"

          if [ "${#SOURCES[@]}" -ne "${#KEYS[@]}" ]; then  
            echo "❌ عدد الروابط وعدد المفاتيح غير متساوي!"  
            exit 1  
          fi  

          NUM_WORKERS=4
          WORKER_ID=${{ matrix.worker }}

          for (( i=0; i<${#SOURCES[@]}; i++ ))  
          do
            if [ $(( i % NUM_WORKERS )) -eq $WORKER_ID ]; then
              SRC="${SOURCES[$i]}"
              KEY="${KEYS[$i]}"
              IDX=$((i+1))

              if [ -z "$SRC" ] || [ -z "$KEY" ]; then
                continue
              fi

              echo "🚀 Launching Stream #$IDX on Worker $WORKER_ID..."

              # التعديل السحري: نسخ الفيديو لتوفير الـ CPU + إعادة ترميز الصوت لـ aac ليرضى الفيسبوك
              ffmpeg \
                -hide_banner \
                -reconnect 1 \
                -reconnect_streamed 1 \
                -reconnect_delay_max 10 \
                -thread_queue_size 4096 \
                -i "$SRC" \
                -c:v copy \
                -c:a aac \
                -b:a 128k \
                -ar 44100 \
                -f flv \
                "rtmps://live-api-s.facebook.com:443/rtmp/$KEY" &
                
              sleep 3
            fi
          done

          echo "⏳ All background streams initiated. Watching..."
          wait
          
