name: 🚀 FB Multi Stream MATRIX PRO MAX

on:
  workflow_dispatch:
    inputs:
      SOURCE_LINKS:
        description: 'روابط البث - فرق بينهم بـ ,'
        required: true
      FB_STREAM_KEYS:
        description: 'مفاتيح البث - فرق بينهم بـ ,'
        required: true
      WATERMARK_TEXT:
        description: 'نص العلامة المائية'
        required: true
        default: 'CHAFIK GHADDAR TV'

jobs:
  stream:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        worker: [0, 1, 2, 3]

    steps:  
      - name: ⚡ Install FFmpeg  
        run: |  
          sudo apt-get update  
          sudo apt-get install -y ffmpeg  

      - name: 🎥 Launch Parallel Streams inside Worker ${{ matrix.worker }}  
        run: |  
          # تعويض أي مساحات زائدة وتنظيف المدخلات
          CLEANED_SOURCES=$(echo "${{ github.event.inputs.SOURCE_LINKS }}" | sed 's/ //g')
          CLEANED_KEYS=$(echo "${{ github.event.inputs.FB_STREAM_KEYS }}" | sed 's/ //g')

          IFS=',' read -ra SOURCES <<< "$CLEANED_SOURCES"
          IFS=',' read -ra KEYS <<< "$CLEANED_KEYS"

          if [ "${#SOURCES[@]}" -ne "${#KEYS[@]}" ]; then  
            echo "❌ عدد الروابط وعدد المفاتيح غير متساوي!"  
            exit 1  
          fi  

          NUM_WORKERS=4
          WORKER_ID=${{ matrix.worker }}
          
          echo "========================================="  
          echo "🎬 Worker $WORKER_ID is sorting and launching its streams..."  
          echo "========================================="  

          for (( i=0; i<${#SOURCES[@]}; i++ ))  
          do
            if [ $(( i % NUM_WORKERS )) -eq $WORKER_ID ]; then
              SRC="${SOURCES[$i]}"
              KEY="${KEYS[$i]}"
              IDX=$((i+1))

              # التأكد من أن الرابط والمفتاح ليسا فارغين
              if [ -z "$SRC" ] || [ -z "$KEY" ]; then
                continue
              fi

              echo "🚀 Starting Stream #$IDX on Worker $WORKER_ID..."

              ffmpeg \
                -hide_banner \
                -reconnect 1 \
                -reconnect_streamed 1 \
                -reconnect_delay_max 10 \
                -thread_queue_size 4096 \
                -i "$SRC" \
                -vf "drawtext=text='${{ github.event.inputs.WATERMARK_TEXT }}':fontcolor=white:fontsize=36:borderw=2:bordercolor=black:box=1:boxcolor=black@0.4:x=w-mod(t*100\,w+tw):y=h-th-25" \
                -map 0:v:0 \
                -map 0:a? \
                -c:v libx264 \
                -preset ultrafast \
                -tune zerolatency \
                -pix_fmt yuv420p \
                -profile:v main \
                -r 30 \
                -g 60 \
                -keyint_min 60 \
                -sc_threshold 0 \
                -b:v 2500k \
                -maxrate 2500k \
                -bufsize 5000k \
                -c:a aac \
                -b:a 128k \
                -ar 44100 \
                -f flv \
                "rtmps://live-api-s.facebook.com:443/rtmp/$KEY" &
                
              # مهلة قصيرة (2 ثواني) باش نخليو FFmpeg يتصل بالرابط اللول قبل ما يدوز للثاني
              sleep 2
            fi
          done

          echo "⏳ All assigned background streams launched. Waiting for active streams to finish..."
          wait
          
