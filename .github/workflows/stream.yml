name: 🚀 FB Matrix Multi-Stream PRO MAX

on:
  workflow_dispatch:
    inputs:
      STREAMS_LIST:
        description: "ضع الروابط والسوارت هنا (كل سطر فيه: الرابط,الساروت)"
        required: true
      WATERMARK_TEXT:
        description: 'نص العلامة المائية'
        required: true
        default: 'CHAFIK GHADDAR T V'

jobs:
  # المرحلة الأولى: تنظيف وتجميع الداتا فـ الـ Main Shell بلا ما تضيع
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix-jobs: ${{ steps.set-matrix.outputs.matrix-jobs }}
    steps:
      - name: Generate Matrix Config
        id: set-matrix
        run: |
          JSON_RAW=""
          CLEANED_LIST=$(echo "${{ github.event.inputs.STREAMS_LIST }}" | tr -d '\r')
          
          # استخدام <<< كيحافظ على المتغيرات وسط الـ Shell الرئيسي
          while IFS=',' read -r src_link fb_key; do
            [ -z "$src_link" ] || [ -z "$fb_key" ] && continue
            
            SRC=$(echo "$src_link" | xargs)
            KEY=$(echo "$fb_key" | xargs)
            
            if [ ! -z "$SRC" ] && [ ! -z "$KEY" ]; then
              JSON_RAW+='{"source":"'"$SRC"'","key":"'"$KEY"'"},'
            fi
          done <<< "$CLEANED_LIST"
          
          JSON_CLEAN="[${JSON_RAW%,}]"
          echo "matrix-jobs=${JSON_CLEAN}" >> $GITHUB_OUTPUT

  # المرحلة الثانية: إطلاق البث المتوازي فـ سيرفرات مستقلة ناضية
  broadcast:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stream: ${{ fromJson(needs.prepare-matrix.outputs.matrix-jobs) }}
        
    steps:
      - name: ⚡ Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          
      - name: 🚀 Launch Stream to Facebook Live
        run: |
          echo "Launching Parallel Stream for: ${{ matrix.stream.source }}"
          
          ffmpeg -hide_banner -loglevel warning \
          -thread_queue_size 1024 -i "${{ matrix.stream.source }}" \
          -vf "drawtext=text='${{ github.event.inputs.WATERMARK_TEXT }}':fontcolor=white:fontsize=35:box=1:boxcolor=black@0.5:x=w-mod(t*120\,w+text_w):y=h-th-30" \
          -c:v libx264 -preset veryfast -profile:v main -b:v 2500k -maxrate 2500k -bufsize 5000k \
          -pix_fmt yuv420p -g 60 \
          -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmps://live-api-s.facebook.com:443/rtmp/${{ matrix.stream.key }}"
          
